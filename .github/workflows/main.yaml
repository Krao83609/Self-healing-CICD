name: CI Pipline for nodeJs app

on:
  push:
    branches:
      - main
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4
      - name: setup nodeJs
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: install dependencies
        run: npm install
      - name: Run tests
        run: npm test
      - name: build project
        run: npm run build --if-present
  notify-n8n-on-failure:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: failure()
    steps:
      - name: Trigger n8n webhook
        run: | 
          curl -X POST "${{ secrets.N8N_URL_WEBHOOK }}" \
          - H "Content-type: applications/json" \
          - H "x-webhook-secret: ${{ secrets.N8N_SECRET_WEBHOOK}}" \
          - d '{
              "run-id": "${{ github.run_id }}",
              "repo": "${{ github.repository }}",
              "branch": "${{ github.ref_name}}",
              "commit": "${{ github.sha }}",
              "actor": "${{ github.actor }}"
          }'